<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Registro</title>
  <link rel="stylesheet" href="/style/auth.css">
</head>

<body class="auth-page">
  <main class="auth-layout">
    <section class="auth-card">
      <a href="/" class="auth-back-link">Volver a la pagina principal</a>
      <h1 class="auth-title">Crear cuenta</h1>
      <p class="auth-subtitle">Registrate para guardar tu informacion y entrar a la tienda.</p>

      <form id="registerForm" class="auth-form">
        <label class="auth-label" for="nombre">Nombre</label>
        <input type="text" id="nombre" placeholder="Nombre" class="auth-input" required>

        <label class="auth-label" for="apellidos">Apellidos</label>
        <input type="text" id="apellidos" placeholder="Apellidos" class="auth-input" required>

        <label class="auth-label" for="email">Correo</label>
        <input type="email" id="email" placeholder="Correo" class="auth-input" required
          pattern="^[a-zA-Z0-9._%+-]+@(gmail\.com|hotmail\.com|outlook\.com)$">

        <label class="auth-label" for="password">Contrasena</label>
        <input type="password" id="password" placeholder="Contrasena" class="auth-input" required>

        <button type="submit" class="auth-submit">Registrarse</button>
      </form>
    </section>
  </main>
  <script src="/register.js"></script>

</body>

</html>
