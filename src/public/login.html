<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="/style/auth.css">
</head>
<body class="auth-page">
<main class="auth-layout">
  <section class="auth-card">
    <a href="/" class="auth-back-link">Volver a la pagina principal</a>
    <h1 class="auth-title">Iniciar sesion</h1>
    <p class="auth-subtitle">Accede a tu cuenta para revisar productos y navegar por el catalogo.</p>

    <form id="loginForm" class="auth-form">
      <label class="auth-label" for="email">Correo</label>
      <input type="email" id="email" placeholder="Correo" class="auth-input" required>

      <label class="auth-label" for="password">Contrasena</label>
      <input type="password" id="password" placeholder="Contrasena" class="auth-input" required>

      <button type="submit" class="auth-submit">Ingresar</button>
    </form>
  </section>
</main>
<script src="/login.js"></script>
</body>
</html>
