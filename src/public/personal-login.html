<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Personal</title>
    <link rel="stylesheet" href="/style/auth.css">
</head>

<body class="auth-page">
    <main class="auth-layout">
        <section class="auth-card auth-card-admin">
            <h1 class="auth-title">Acceso del personal</h1>
            <p class="auth-subtitle">Ingresa con tu cuenta de superadministrador para gestionar usuarios y productos.</p>

            <form id="personalForm" class="auth-form">
                <label class="auth-label" for="email">Correo</label>
                <input type="email" id="email" placeholder="Correo" class="auth-input" required>

                <label class="auth-label" for="password">Contrasena</label>
                <input type="password" id="password" placeholder="Contrasena" class="auth-input" required>

                <button type="submit" class="auth-submit">
                    Iniciar sesion
                </button>
            </form>
        </section>
    </main>
    <script src="/personal-login.js"></script>

</body>

</html>
